spring.application.name=submission-service
server.port=8083

# MySQL Configuration (Assuming submission-service will also need the db)
spring.datasource.url=jdbc:mysql://localhost:3308/devgraph
spring.datasource.username=devuser
spring.datasource.password=devpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Configuration (For message queueing / caching later)
spring.data.redis.host=localhost
spring.data.redis.port=6379
