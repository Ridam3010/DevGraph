version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: devgraph-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: devgraph
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7.0-alpine
    container_name: devgraph-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
